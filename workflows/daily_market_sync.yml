name: Daily Market Data Sync

on:
  schedule:
    # Runs at 06:00 UTC
    # Runs Tue - Sat to capture Monday - Friday market data
    - cron: '0 6 * * 2-6'
  
  # button to manually run for testing
  workflow_dispatch:

jobs:
  sync-database:
    runs-on: ubuntu-latest

    steps:
      # grab code from the repo
      - name: Checkout fetch script and ticker csv
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            server/src/services/daily_fetch.py
            server/src/services/tickers.csv
          sparse-checkout-cone-mode: false
      
      # install a standard python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.5'
      
      # Install the required libraries used by script
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests sqlmodel sqlalchemy psycopg2-binary python-dotenv
      
      # run the python script with the injected secrets
      - name: Execute Daily Fetch Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MASSIVE: ${{ secrets.MASSIVE }}
        run: python server/src/services/daily_fetch.py